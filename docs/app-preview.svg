<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Semiconductor optimization dashboard preview</title>
  <desc id="desc">Schematic preview of the Streamlit dashboard showing sidebar controls, optimization tabs, and simulation outputs.</desc>

  <rect width="1200" height="680" fill="#f6f4ef"/>
  <rect x="20" y="20" width="1160" height="640" rx="24" fill="#fffdf8" stroke="#d8d0c2" stroke-width="2"/>

  <text x="44" y="60" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#182026">
    Semiconductor E2E Manufacturing Optimization
  </text>
  <text x="44" y="90" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#5b6570">
    Streamlit dashboard preview: nominal, static robust, ellipsoidal, adaptive, and Monte Carlo views
  </text>

  <rect x="44" y="120" width="230" height="500" rx="18" fill="#183153"/>
  <text x="64" y="154" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff">
    Sidebar Controls
  </text>

  <rect x="62" y="176" width="194" height="58" rx="12" fill="#264b7b"/>
  <text x="78" y="210" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#ffffff">Demand level</text>

  <rect x="62" y="246" width="194" height="76" rx="12" fill="#264b7b"/>
  <text x="78" y="278" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#ffffff">Supplier capacities</text>
  <text x="78" y="300" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#ffffff">and cost inputs</text>

  <rect x="62" y="334" width="194" height="86" rx="12" fill="#264b7b"/>
  <text x="78" y="366" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#ffffff">Yield mean / std</text>
  <text x="78" y="388" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#ffffff">Set widths</text>

  <rect x="62" y="432" width="194" height="76" rx="12" fill="#264b7b"/>
  <text x="78" y="464" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#ffffff">Gamma / Rho</text>
  <text x="78" y="486" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#ffffff">Uncertainty family</text>

  <rect x="62" y="520" width="194" height="82" rx="12" fill="#264b7b"/>
  <text x="78" y="552" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#ffffff">Monte Carlo runs</text>
  <text x="78" y="574" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#ffffff">Random seed</text>

  <rect x="306" y="120" width="850" height="56" rx="16" fill="#efe8db" stroke="#d8d0c2"/>
  <text x="330" y="154" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="600" fill="#3d4650">
